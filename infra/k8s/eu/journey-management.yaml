apiVersion: apps/v1
kind: Deployment
metadata:
  name: journey-management
  namespace: eu
  labels:
    app: journey-management
    region: eu
spec:
  replicas: 2
  selector:
    matchLabels:
      app: journey-management
  template:
    metadata:
      labels:
        app: journey-management
        region: eu
    spec:
      containers:
        - name: journey-management
          image: traffic/journey-management:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: traffic-config
          env:
            - name: SERVICE_NAME
              value: "journey-management"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: traffic-secrets
                  key: JWT_SECRET
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: journey-management
  namespace: eu
spec:
  selector:
    app: journey-management
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
