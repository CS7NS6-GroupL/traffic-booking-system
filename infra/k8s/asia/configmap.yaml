apiVersion: v1
kind: ConfigMap
metadata:
  name: traffic-config
  namespace: asia   # namespace label; REGION below is what the code reads
data:
  REGION: "middle-east"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  REDIS_URL: "redis://redis:6379"
  MONGO_URI: "mongodb+srv://<user>:<pass>@cluster.mongodb.net/traffic?retryWrites=true"
  JWT_SECRET: "changeme-replace-in-production"
  JWT_ALGORITHM: "HS256"
  JOURNEY_MANAGEMENT_URL: "http://journey-management:8000"
  MIDDLE_EAST_ROUTE_URL: "http://route-service:8000"
  EUROPE_ROUTE_URL: "http://data-gateway-eu:8000"
  NORTH_AMERICA_ROUTE_URL: "http://data-gateway-na:8000"
