apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-gateway
  namespace: asia
  labels:
    app: data-gateway
    region: asia
spec:
  replicas: 2
  selector:
    matchLabels:
      app: data-gateway
  template:
    metadata:
      labels:
        app: data-gateway
        region: asia
    spec:
      containers:
        - name: data-gateway
          image: traffic/data-gateway:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: traffic-config
          env:
            - name: SERVICE_NAME
              value: "data-gateway"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: traffic-secrets
                  key: JWT_SECRET
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: data-gateway
  namespace: asia
spec:
  selector:
    app: data-gateway
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
