apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
  namespace: us
  labels:
    app: booking-service
    region: us
spec:
  replicas: 2
  selector:
    matchLabels:
      app: booking-service
  template:
    metadata:
      labels:
        app: booking-service
        region: us
    spec:
      containers:
        - name: booking-service
          image: traffic/booking-service:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: traffic-config
          env:
            - name: SERVICE_NAME
              value: "booking-service"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: traffic-secrets
                  key: JWT_SECRET
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: booking-service
  namespace: us
spec:
  selector:
    app: booking-service
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
