upstream booking_service {
    least_conn;
    server booking-service-1:8000;
    server booking-service-2:8000;
}

upstream journey_management {
    least_conn;
    server journey-management-1:8000;
    server journey-management-2:8000;
}

upstream notification_service {
    ip_hash;
    server notification-service-1:8000;
    server notification-service-2:8000;
}

upstream data_service {
    least_conn;
    server data-service-1:8009;
    server data-service-2:8009;
}

upstream data_service_laos {
    least_conn;
    server data-service-laos-1:8009;
    server data-service-laos-2:8009;
}

upstream data_service_cambodia {
    least_conn;
    server data-service-cambodia-1:8009;
    server data-service-cambodia-2:8009;
}

upstream data_service_andorra {
    least_conn;
    server data-service-andorra-1:8009;
    server data-service-andorra-2:8009;
}

server {
    listen 80;
    server_name _;

    # Static frontend
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # WebSocket — sticky via ip_hash upstream
    location /ws/ {
        proxy_pass         http://notification_service/ws/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
    }

    proxy_next_upstream error timeout http_502 http_503;
    proxy_next_upstream_tries 2;
    proxy_connect_timeout 5s;
    proxy_read_timeout 30s;

    location ~ ^/api/authority/laos(.*)$ {
        proxy_pass http://authority-service-laos:8000/authority$1$is_args$args;
        proxy_set_header Host $host;
    }
    location ~ ^/api/authority/cambodia(.*)$ {
        proxy_pass http://authority-service-cambodia:8000/authority$1$is_args$args;
        proxy_set_header Host $host;
    }
    location ~ ^/api/authority/andorra(.*)$ {
        proxy_pass http://authority-service-andorra:8000/authority$1$is_args$args;
        proxy_set_header Host $host;
    }
    location ~ ^/api/auth(.*)$ {
        proxy_pass http://user-registry:8000/auth$1$is_args$args;
        proxy_set_header Host $host;
    }
    location ~ ^/api/bookings(.*)$ {
        proxy_pass http://booking_service/bookings$1$is_args$args;
        proxy_set_header Host $host;
    }
    location ~ ^/api/journeys(.*)$ {
        proxy_pass http://journey_management/journeys$1$is_args$args;
        proxy_set_header Host $host;
    }
    location ~ ^/api/sagas(.*)$ {
        proxy_pass http://journey_management/sagas$1$is_args$args;
        proxy_set_header Host $host;
    }

    # Aggregate health routes — used by the frontend health dashboard.
    # Proxy to upstream so any healthy instance satisfies the check.
    location = /api/health/booking      { proxy_pass http://booking_service/health; }
    location = /api/health/journey      { proxy_pass http://journey_management/health; }
    location = /api/health/notification { proxy_pass http://notification_service/health; }
    location = /api/health/data         { proxy_pass http://data_service/health; }
    location = /api/health/user         { proxy_pass http://user-registry:8000/health; }
    location = /api/health/gateway      { proxy_pass http://data-gateway:8000/health; }

    location = /api/health/validation-laos     { proxy_pass http://validation-service-laos-1:8000/health; }
    location = /api/health/data-laos           { proxy_pass http://data_service_laos/health; }
    location = /api/health/validation-cambodia { proxy_pass http://validation-service-cambodia-1:8000/health; }
    location = /api/health/data-cambodia       { proxy_pass http://data_service_cambodia/health; }
    location = /api/health/validation-andorra  { proxy_pass http://validation-service-andorra-1:8000/health; }
    location = /api/health/data-andorra        { proxy_pass http://data_service_andorra/health; }

    # Per-instance health routes — for direct instance inspection.
    location = /api/health/booking-1    { proxy_pass http://booking-service-1:8000/health; }
    location = /api/health/booking-2    { proxy_pass http://booking-service-2:8000/health; }
    location = /api/health/journey-1    { proxy_pass http://journey-management-1:8000/health; }
    location = /api/health/journey-2    { proxy_pass http://journey-management-2:8000/health; }
    location = /api/health/notification-1 { proxy_pass http://notification-service-1:8000/health; }
    location = /api/health/notification-2 { proxy_pass http://notification-service-2:8000/health; }
    location = /api/health/data-1       { proxy_pass http://data-service-1:8009/health; }
    location = /api/health/data-2       { proxy_pass http://data-service-2:8009/health; }

    location = /api/health/route-laos            { proxy_pass http://route-service-laos:8000/health; }
    location = /api/health/validation-laos-1     { proxy_pass http://validation-service-laos-1:8000/health; }
    location = /api/health/validation-laos-2     { proxy_pass http://validation-service-laos-2:8000/health; }
    location = /api/health/authority-laos        { proxy_pass http://authority-service-laos:8000/health; }
    location = /api/health/data-laos-1           { proxy_pass http://data-service-laos-1:8009/health; }
    location = /api/health/data-laos-2           { proxy_pass http://data-service-laos-2:8009/health; }

    location = /api/health/route-cambodia        { proxy_pass http://route-service-cambodia:8000/health; }
    location = /api/health/validation-cambodia-1 { proxy_pass http://validation-service-cambodia-1:8000/health; }
    location = /api/health/validation-cambodia-2 { proxy_pass http://validation-service-cambodia-2:8000/health; }
    location = /api/health/authority-cambodia    { proxy_pass http://authority-service-cambodia:8000/health; }
    location = /api/health/data-cambodia-1       { proxy_pass http://data-service-cambodia-1:8009/health; }
    location = /api/health/data-cambodia-2       { proxy_pass http://data-service-cambodia-2:8009/health; }

    location = /api/health/route-andorra         { proxy_pass http://route-service-andorra:8000/health; }
    location = /api/health/validation-andorra-1  { proxy_pass http://validation-service-andorra-1:8000/health; }
    location = /api/health/validation-andorra-2  { proxy_pass http://validation-service-andorra-2:8000/health; }
    location = /api/health/authority-andorra     { proxy_pass http://authority-service-andorra:8000/health; }
    location = /api/health/data-andorra-1        { proxy_pass http://data-service-andorra-1:8009/health; }
    location = /api/health/data-andorra-2        { proxy_pass http://data-service-andorra-2:8009/health; }
}
