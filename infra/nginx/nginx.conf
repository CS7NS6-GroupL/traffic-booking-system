server {
    listen 80;
    server_name _;

    # ── Static frontend ────────────────────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── WebSocket — must use http upgrade ────────────────────────────────────
    location /ws/ {
        proxy_pass         http://notification-service:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
    }

    # ── API proxies ─────────────────────────────────────────────────────────
    # Pattern: /api/<service-path> → http://<container>:8000/<service-path>

    location ~ ^/api/auth(.*)$ {
        proxy_pass http://user-registry:8000/auth$1$is_args$args;
        proxy_set_header Host $host;
    }

    location ~ ^/api/bookings(.*)$ {
        proxy_pass http://booking-service:8000/bookings$1$is_args$args;
        proxy_set_header Host $host;
    }

    location ~ ^/api/journeys(.*)$ {
        proxy_pass http://journey-management:8000/journeys$1$is_args$args;
        proxy_set_header Host $host;
    }

    location ~ ^/api/sagas(.*)$ {
        proxy_pass http://journey-management:8000/sagas$1$is_args$args;
        proxy_set_header Host $host;
    }

    location ~ ^/api/authority(.*)$ {
        proxy_pass http://authority-service:8000/authority$1$is_args$args;
        proxy_set_header Host $host;
    }

    # ── Health checks — one per service ────────────────────────────────────
    location = /api/health/booking         { proxy_pass http://booking-service:8000/health; }
    location = /api/health/user            { proxy_pass http://user-registry:8000/health; }
    location = /api/health/authority       { proxy_pass http://authority-service:8000/health; }
    location = /api/health/gateway         { proxy_pass http://data-gateway:8000/health; }
    location = /api/health/notification    { proxy_pass http://notification-service:8000/health; }
    location = /api/health/journey         { proxy_pass http://journey-management:8000/health; }

    # Regional service health checks
    location = /api/health/route-eu        { proxy_pass http://route-service-eu:8000/health; }
    location = /api/health/validation-eu   { proxy_pass http://validation-service-eu:8000/health; }
    location = /api/health/route-me        { proxy_pass http://route-service-me:8000/health; }
    location = /api/health/validation-me   { proxy_pass http://validation-service-me:8000/health; }
    location = /api/health/route-na        { proxy_pass http://route-service-na:8000/health; }
    location = /api/health/validation-na   { proxy_pass http://validation-service-na:8000/health; }
}
