version: "3.9"

# CS7NS6 — Traffic Booking System
# Brings up all 8 microservices + Kafka + Zookeeper + Redis + MongoDB

networks:
  traffic-net:
    driver: bridge

volumes:
  mongo-data:
  redis-data:

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - traffic-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    networks:
      - traffic-net
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: >
      bash -c "
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic booking-requests  --partitions 3 --replication-factor 1 &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic booking-outcomes  --partitions 3 --replication-factor 1 &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic capacity-releases --partitions 1 --replication-factor 1 &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic notifications    --partitions 3 --replication-factor 1
      "
    networks:
      - traffic-net

  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --save 60 1
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - traffic-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./infra/mongo/seed.js:/docker-entrypoint-initdb.d/seed.js:ro
    networks:
      - traffic-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ping:1})"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ── Application Services ────────────────────────────────────────────────────

  booking-service:
    build:
      context: .
      dockerfile: services/booking-service/Dockerfile
    container_name: booking-service
    ports:
      - "8001:8000"
    env_file:
      - services/booking-service/.env
    environment:
      SERVICE_NAME: booking-service
      JOURNEY_MANAGEMENT_URL: http://journey-management:8000
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - traffic-net

  user-registry:
    build:
      context: .
      dockerfile: services/user-registry/Dockerfile
    container_name: user-registry
    ports:
      - "8002:8000"
    env_file:
      - services/user-registry/.env
    environment:
      SERVICE_NAME: user-registry
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - traffic-net

  authority-service:
    build:
      context: .
      dockerfile: services/authority-service/Dockerfile
    container_name: authority-service
    ports:
      - "8003:8000"
    env_file:
      - services/authority-service/.env
    environment:
      SERVICE_NAME: authority-service
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - traffic-net

  data-gateway:
    build:
      context: .
      dockerfile: services/data-gateway/Dockerfile
    container_name: data-gateway
    ports:
      - "8004:8000"
    env_file:
      - services/data-gateway/.env
    environment:
      SERVICE_NAME: data-gateway
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - traffic-net

  validation-service:
    build:
      context: .
      dockerfile: services/validation-service/Dockerfile
    container_name: validation-service
    ports:
      - "8005:8000"
    env_file:
      - services/validation-service/.env
    environment:
      SERVICE_NAME: validation-service
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - traffic-net

  route-service:
    build:
      context: .
      dockerfile: services/route-service/Dockerfile
    container_name: route-service
    ports:
      - "8006:8000"
    env_file:
      - services/route-service/.env
    environment:
      SERVICE_NAME: route-service
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - traffic-net

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: notification-service
    ports:
      - "8007:8000"
    env_file:
      - services/notification-service/.env
    environment:
      SERVICE_NAME: notification-service
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - traffic-net

  journey-management:
    build:
      context: .
      dockerfile: services/journey-management/Dockerfile
    container_name: journey-management
    ports:
      - "8008:8000"
    env_file:
      - services/journey-management/.env
    environment:
      SERVICE_NAME: journey-management
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - traffic-net

  nginx:
    build:
      context: .
      dockerfile: infra/nginx/Dockerfile
    container_name: nginx
    ports:
      - "80:80"
    depends_on:
      - booking-service
      - user-registry
      - authority-service
      - journey-management
      - notification-service
      - route-service
      - validation-service
      - data-gateway
    networks:
      - traffic-net
