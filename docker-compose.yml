version: "3.9"

# CS7NS6 — Traffic Booking System
# Brings up all application services across 3 regions + shared infrastructure.
#
# Regions and imported OSM data:
#   andorra  — Andorra (isolated micro-state)
#   laos     — Laos
#   cambodia — Cambodia
#
# Cross-region saga demo: Laos ↔ Cambodia via Voen Kham / Don Kralor border crossing.

networks:
  traffic-net:
    driver: bridge

volumes:
  mongo-data:
  mongo-laos-data:
  mongo-cambodia-data:
  mongo-andorra-data:
  redis-laos-data:
  redis-cambodia-data:
  redis-andorra-data:

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - traffic-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    networks:
      - traffic-net
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  # Creates all Kafka topics before any service starts consuming or producing.
  # on-failure: retries if topic creation fails, but does not restart after clean exit.
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    restart: on-failure
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: >
      bash -c "
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic booking-requests  --partitions 3 --replication-factor 1 &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic booking-outcomes  --partitions 3 --replication-factor 1 &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic capacity-releases --partitions 1 --replication-factor 1 &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic notifications    --partitions 3 --replication-factor 1 &&
        echo 'Kafka topics created.'
      "
    networks:
      - traffic-net

  redis-laos:
    image: redis:7-alpine
    container_name: redis-laos
    command: redis-server --save 60 1
    restart: unless-stopped
    volumes:
      - redis-laos-data:/data
    networks:
      - traffic-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-cambodia:
    image: redis:7-alpine
    container_name: redis-cambodia
    command: redis-server --save 60 1
    restart: unless-stopped
    volumes:
      - redis-cambodia-data:/data
    networks:
      - traffic-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-andorra:
    image: redis:7-alpine
    container_name: redis-andorra
    command: redis-server --save 60 1
    restart: unless-stopped
    volumes:
      - redis-andorra-data:/data
    networks:
      - traffic-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./infra/mongo/seed.js:/docker-entrypoint-initdb.d/seed.js:ro
    networks:
      - traffic-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ping:1})"]
      interval: 10s
      timeout: 10s
      retries: 5

  # Regional MongoDB instances — OSM graph data only (osm_nodes, osm_edges).
  # Run import_osm.py against each after stack is up (see CLAUDE.md).

  mongo-laos:
    image: mongo:7
    container_name: mongo-laos
    restart: unless-stopped
    ports:
      - "27020:27017"
    volumes:
      - mongo-laos-data:/data/db
    networks:
      - traffic-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ping:1})"]
      interval: 10s
      timeout: 10s
      retries: 5

  mongo-cambodia:
    image: mongo:7
    container_name: mongo-cambodia
    restart: unless-stopped
    ports:
      - "27021:27017"
    volumes:
      - mongo-cambodia-data:/data/db
    networks:
      - traffic-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ping:1})"]
      interval: 10s
      timeout: 10s
      retries: 5

  mongo-andorra:
    image: mongo:7
    container_name: mongo-andorra
    restart: unless-stopped
    ports:
      - "27022:27017"
    volumes:
      - mongo-andorra-data:/data/db
    networks:
      - traffic-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ping:1})"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ── Global services (not region-specific) ───────────────────────────────────

  user-registry:
    build:
      context: .
      dockerfile: services/user-registry/Dockerfile
    container_name: user-registry
    restart: unless-stopped
    ports:
      - "8002:8000"
    env_file:
      - services/user-registry/.env
    environment:
      SERVICE_NAME: user-registry
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - traffic-net

  # Regional data-service instances — bookings stored per region
  data-service-laos:
    build:
      context: .
      dockerfile: services/data/Dockerfile
    container_name: data-service-laos
    restart: unless-stopped
    ports:
      - "8019:8009"
    environment:
      SERVICE_NAME: data-service-laos
      REGION: laos
      MONGO_URI: mongodb://mongo-laos:27017
    depends_on:
      mongo-laos:
        condition: service_healthy
    networks:
      - traffic-net

  data-service-cambodia:
    build:
      context: .
      dockerfile: services/data/Dockerfile
    container_name: data-service-cambodia
    restart: unless-stopped
    ports:
      - "8029:8009"
    environment:
      SERVICE_NAME: data-service-cambodia
      REGION: cambodia
      MONGO_URI: mongodb://mongo-cambodia:27017
    depends_on:
      mongo-cambodia:
        condition: service_healthy
    networks:
      - traffic-net

  data-service-andorra:
    build:
      context: .
      dockerfile: services/data/Dockerfile
    container_name: data-service-andorra
    restart: unless-stopped
    ports:
      - "8039:8009"
    environment:
      SERVICE_NAME: data-service-andorra
      REGION: andorra
      MONGO_URI: mongodb://mongo-andorra:27017
    depends_on:
      mongo-andorra:
        condition: service_healthy
    networks:
      - traffic-net

  # Regional authority-service instances — each authority can only see its own region
  authority-service-laos:
    build:
      context: .
      dockerfile: services/authority-service/Dockerfile
    container_name: authority-service-laos
    restart: unless-stopped
    ports:
      - "8013:8000"
    environment:
      SERVICE_NAME: authority-service-laos
      REGION: laos
      DATA_SERVICE_URL: http://data-service-laos:8009
    depends_on:
      data-service-laos:
        condition: service_started
    networks:
      - traffic-net

  authority-service-cambodia:
    build:
      context: .
      dockerfile: services/authority-service/Dockerfile
    container_name: authority-service-cambodia
    restart: unless-stopped
    ports:
      - "8023:8000"
    environment:
      SERVICE_NAME: authority-service-cambodia
      REGION: cambodia
      DATA_SERVICE_URL: http://data-service-cambodia:8009
    depends_on:
      data-service-cambodia:
        condition: service_started
    networks:
      - traffic-net

  authority-service-andorra:
    build:
      context: .
      dockerfile: services/authority-service/Dockerfile
    container_name: authority-service-andorra
    restart: unless-stopped
    ports:
      - "8033:8000"
    environment:
      SERVICE_NAME: authority-service-andorra
      REGION: andorra
      DATA_SERVICE_URL: http://data-service-andorra:8009
    depends_on:
      data-service-andorra:
        condition: service_started
    networks:
      - traffic-net

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: notification-service
    restart: unless-stopped
    ports:
      - "8007:8000"
    env_file:
      - services/notification-service/.env
    environment:
      SERVICE_NAME: notification-service
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - traffic-net

  # Data Service — single source of truth for all MongoDB access
  data-service:
    build:
      context: .
      dockerfile: services/data/Dockerfile
    container_name: data-service
    restart: unless-stopped
    ports:
      - "8009:8009"
    environment:
      SERVICE_NAME: data-service
      MONGO_URI: mongodb://mongo:27017
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - traffic-net

  # Journey Management is global — it holds the region overlay graph and
  # coordinates cross-region sagas via Kafka.
  journey-management:
    build:
      context: .
      dockerfile: services/journey-management/Dockerfile
    container_name: journey-management
    restart: unless-stopped
    ports:
      - "8008:8000"
    env_file:
      - services/journey-management/.env
    environment:
      SERVICE_NAME: journey-management
      DATA_SERVICE_URL: http://data-service:8009
      DATA_SERVICE_LAOS: http://data-service-laos:8009
      DATA_SERVICE_CAMBODIA: http://data-service-cambodia:8009
      DATA_SERVICE_ANDORRA: http://data-service-andorra:8009
      ANDORRA_ROUTE_URL: http://route-service-andorra:8000
      LAOS_ROUTE_URL: http://route-service-laos:8000
      CAMBODIA_ROUTE_URL: http://route-service-cambodia:8000
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      mongo:
        condition: service_healthy
      data-service:
        condition: service_started
      data-service-laos:
        condition: service_started
      data-service-cambodia:
        condition: service_started
      data-service-andorra:
        condition: service_started
    networks:
      - traffic-net

  data-gateway:
    build:
      context: .
      dockerfile: services/data-gateway/Dockerfile
    container_name: data-gateway
    restart: unless-stopped
    ports:
      - "8004:8000"
    env_file:
      - services/data-gateway/.env
    environment:
      SERVICE_NAME: data-gateway
      REGION: laos
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - traffic-net

  # ── Laos cluster ────────────────────────────────────────────────────────────

  booking-service:
    build:
      context: .
      dockerfile: services/booking-service/Dockerfile
    container_name: booking-service
    restart: unless-stopped
    ports:
      - "8001:8000"
    env_file:
      - services/booking-service/.env
    environment:
      SERVICE_NAME: booking-service
      REGION: laos
      JOURNEY_MANAGEMENT_URL: http://journey-management:8000
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      mongo:
        condition: service_healthy
    networks:
      - traffic-net

  route-service-laos:
    build:
      context: .
      dockerfile: services/route-service/Dockerfile
    container_name: route-service-laos
    restart: unless-stopped
    ports:
      - "8006:8000"
    env_file:
      - services/route-service/.env
    environment:
      SERVICE_NAME: route-service-laos
      REGION: laos
      MONGO_URI: mongodb://mongo-laos:27017
    depends_on:
      mongo-laos:
        condition: service_healthy
    networks:
      - traffic-net

  validation-service-laos:
    build:
      context: .
      dockerfile: services/validation-service/Dockerfile
    container_name: validation-service-laos
    restart: unless-stopped
    ports:
      - "8005:8000"
    env_file:
      - services/validation-service/.env
    environment:
      SERVICE_NAME: validation-service-laos
      REGION: laos
      REDIS_URL: redis://redis-laos:6379
      MONGO_URI: mongodb://mongo-laos:27017
      DATA_SERVICE_URL: http://data-service-laos:8009
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      redis-laos:
        condition: service_healthy
      mongo-laos:
        condition: service_healthy
      data-service-laos:
        condition: service_started
    networks:
      - traffic-net

  # ── Cambodia cluster ─────────────────────────────────────────────────────────

  route-service-cambodia:
    build:
      context: .
      dockerfile: services/route-service/Dockerfile
    container_name: route-service-cambodia
    restart: unless-stopped
    ports:
      - "8016:8000"
    env_file:
      - services/route-service/.env
    environment:
      SERVICE_NAME: route-service-cambodia
      REGION: cambodia
      MONGO_URI: mongodb://mongo-cambodia:27017
    depends_on:
      mongo-cambodia:
        condition: service_healthy
    networks:
      - traffic-net

  validation-service-cambodia:
    build:
      context: .
      dockerfile: services/validation-service/Dockerfile
    container_name: validation-service-cambodia
    restart: unless-stopped
    ports:
      - "8015:8000"
    env_file:
      - services/validation-service/.env
    environment:
      SERVICE_NAME: validation-service-cambodia
      REGION: cambodia
      REDIS_URL: redis://redis-cambodia:6379
      MONGO_URI: mongodb://mongo-cambodia:27017
      DATA_SERVICE_URL: http://data-service-cambodia:8009
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      redis-cambodia:
        condition: service_healthy
      mongo-cambodia:
        condition: service_healthy
      data-service-cambodia:
        condition: service_started
    networks:
      - traffic-net

  # ── Andorra cluster (isolated) ───────────────────────────────────────────────

  route-service-andorra:
    build:
      context: .
      dockerfile: services/route-service/Dockerfile
    container_name: route-service-andorra
    restart: unless-stopped
    ports:
      - "8026:8000"
    env_file:
      - services/route-service/.env
    environment:
      SERVICE_NAME: route-service-andorra
      REGION: andorra
      MONGO_URI: mongodb://mongo-andorra:27017
    depends_on:
      mongo-andorra:
        condition: service_healthy
    networks:
      - traffic-net

  validation-service-andorra:
    build:
      context: .
      dockerfile: services/validation-service/Dockerfile
    container_name: validation-service-andorra
    restart: unless-stopped
    ports:
      - "8025:8000"
    env_file:
      - services/validation-service/.env
    environment:
      SERVICE_NAME: validation-service-andorra
      REGION: andorra
      REDIS_URL: redis://redis-andorra:6379
      MONGO_URI: mongodb://mongo-andorra:27017
      DATA_SERVICE_URL: http://data-service-andorra:8009
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      redis-andorra:
        condition: service_healthy
      mongo-andorra:
        condition: service_healthy
      data-service-andorra:
        condition: service_started
    networks:
      - traffic-net

  # ── NGINX (global API gateway + static frontend) ────────────────────────────

  nginx:
    build:
      context: .
      dockerfile: infra/nginx/Dockerfile
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - booking-service
      - user-registry
      - authority-service-laos
      - authority-service-cambodia
      - authority-service-andorra
      - journey-management
      - notification-service
      - route-service-laos
      - validation-service-laos
      - data-gateway
    networks:
      - traffic-net
